---
# Source: todo-app/templates/mysql-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: todo-app-todo-app-mysql-secret
type: Opaque
stringData:
  mysql-root-password: "RootPassword123"
  mysql-password: "StrongPassword123"
  mysql-user: "todo_user"
  mysql-database: "todo_db"
  database-url: "mysql+pymysql://todo_user:StrongPassword123@todo-app-todo-app-mysql:3306/todo_db?charset=utf8mb4"
---
# Source: todo-app/templates/storageclass.yaml
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp2-immediate
provisioner: ebs.csi.aws.com 
volumeBindingMode: Immediate
reclaimPolicy: Delete
allowVolumeExpansion: true
---
# Source: todo-app/templates/mysql-pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: todo-app-todo-app-mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Source: todo-app/templates/mysql-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: todo-app-todo-app-mysql
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: todo-app-todo-app-mysql
---
# Source: todo-app/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: todo-app-todo-app-web-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: todo-app-todo-app-web
---
# Source: todo-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-todo-app-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: todo-app-todo-app-web
  template:
    metadata:
      labels:
        app: todo-app-todo-app-web
    spec:
      containers:
      - name: web
        image: "pengchaoma/flask-todo-app:1.1.19"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: todo-app-todo-app-mysql-secret
              key: database-url
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
---
# Source: todo-app/templates/mysql-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-todo-app-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app-todo-app-mysql
  template:
    metadata:
      labels:
        app: todo-app-todo-app-mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-app-todo-app-mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: todo-app-todo-app-mysql-secret
              key: mysql-database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: todo-app-todo-app-mysql-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-app-todo-app-mysql-secret
              key: mysql-password
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: todo-app-todo-app-mysql-pvc

