apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-app.fullname" . }}-mysql
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
type: Opaque
data:
  mysql-root-password: {{ .Values.mysql.rootPassword | b64enc | quote }}
  mysql-password: {{ .Values.mysql.password | b64enc | quote }}