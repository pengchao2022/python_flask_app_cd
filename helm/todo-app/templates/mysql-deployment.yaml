apiVersion: apps/v1
# 🚀 动态读取 values 里的工作负载类型，默认值为 Deployment
kind: {{ .Values.mysql.kind | default "Deployment" }}
metadata:
  name: {{ include "todo-app.fullname" . }}-mysql
spec:
  # 🚀 如果配置为 StatefulSet，根据 K8s 规范必须输出 serviceName
  {{- if eq (.Values.mysql.kind | default "Deployment") "StatefulSet" }}
  serviceName: {{ include "todo-app.fullname" . }}-mysql
  {{- end }}
  # 🚀 核心修改：动态读取 values 里的副本数，如果 helm.gotmpl 里没传，默认就是 1
  replicas: {{ .Values.mysql.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "todo-app.fullname" . }}-mysql
  template:
    metadata:
      labels:
        app: {{ include "todo-app.fullname" . }}-mysql
    spec:
      containers:
      - name: mysql
        image: {{ .Values.mysql.image }}
        # 🚀 完美注入：强制将 MySQL 8.0 的密码插件降级为经典模式，彻底解决 PyMySQL 报错
        args:
        - --default-authentication-plugin=mysql_native_password
        ports:
        - containerPort: {{ .Values.mysqlStatic.port }}
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-password
        # 🚀 严格对齐：使用 nindent 10 确保完美融入 containers 作用域
        resources:
          {{- toYaml .Values.mysql.resources | nindent 10 }}
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        # 🚀 完美注入挂载点：把 ConfigMap 里的 init.sql 挂载进 MySQL 官方指定的初始化目录
        - name: mysql-init-volume
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-storage
        {{- if .Values.mysql.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "todo-app.fullname" . }}-mysql-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}
      # 🚀 完美注入卷声明：把下面的 ConfigMap 包装成一个 K8s 虚拟只读磁盘
      - name: mysql-init-volume
        configMap:
          name: {{ include "todo-app.fullname" . }}-mysql-init-script

---
# 🚀 多资源分隔符：在同一个文件内追加声明用于“洗白”密码验证方式的 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todo-app.fullname" . }}-mysql-init-script
data:
  # 当 MySQL 容器发现 data 目录为空、触发初始化时，会自动按顺序执行这里面的 SQL
  init.sql: |
    -- 1. 洗白 root 账号的认证方式
    ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY '{{ .Values.mysqlStatic.rootPassword }}';
    
    -- 2. 🎯 精准洗白普通应用账号的认证方式
    -- Helm 会在部署时自动把这里的 {{ .Values.mysqlStatic.user }} 和 {{ .Values.mysqlStatic.password }} 替换掉
    -- 这样就不需要你在代码里写死任何明文，完美对接你的 Secret！
    ALTER USER '{{ .Values.mysqlStatic.user }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ .Values.mysqlStatic.password }}';
    
    FLUSH PRIVILEGES;