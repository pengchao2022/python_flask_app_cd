apiVersion: apps/v1
# 🚀 动态读取 values 里的工作负载类型，默认值为 Deployment
kind: {{ .Values.mysql.kind | default "Deployment" }}
metadata:
  name: {{ include "todo-app.fullname" . }}-mysql
spec:
  # 🚀 如果配置为 StatefulSet，根据 K8s 规范必须输出 serviceName
  {{- if eq (.Values.mysql.kind | default "Deployment") "StatefulSet" }}
  serviceName: {{ include "todo-app.fullname" . }}-mysql
  {{- end }}
  # 🚀 核心修改：动态读取 values 里的副本数，如果 helm.gotmpl 里没传，默认就是 1
  replicas: {{ .Values.mysql.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "todo-app.fullname" . }}-mysql
  template:
    metadata:
      labels:
        app: {{ include "todo-app.fullname" . }}-mysql
    spec:
      containers:
      - name: mysql
        image: {{ .Values.mysql.image }}
        # 🚀 完美注入：强制将 MySQL 8.0 的密码插件降级为经典模式，彻底解决 PyMySQL 报错
        args:
        - --default-authentication-plugin=mysql_native_password
        ports:
        - containerPort: {{ .Values.mysqlStatic.port }}
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-password
        # 🚀 严格对齐：修复缩进，使用 nindent 10 确保完美融入 containers 作用域
        resources:
          {{- toYaml .Values.mysql.resources | nindent 10 }}
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        {{- if .Values.mysql.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "todo-app.fullname" . }}-mysql-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}