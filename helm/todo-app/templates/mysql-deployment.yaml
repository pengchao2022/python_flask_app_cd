apiVersion: apps/v1
# 🚀 动态读取 values 里的工作负载类型，默认值为 Deployment
kind: {{ .Values.mysql.kind | default "Deployment" }}
metadata:
  name: {{ include "todo-app.fullname" . }}-mysql
spec:
  # 🚀 如果配置为 StatefulSet，根据 K8s 规范必须输出 serviceName
  {{- if eq (.Values.mysql.kind | default "Deployment") "StatefulSet" }}
  serviceName: {{ include "todo-app.fullname" . }}-mysql
  {{- end }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "todo-app.fullname" . }}-mysql
  template:
    metadata:
      labels:
        app: {{ include "todo-app.fullname" . }}-mysql
    spec:
      containers:
      - name: mysql
        image: {{ .Values.mysql.image }}
        ports:
        - containerPort: {{ .Values.mysqlStatic.port }}
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "todo-app.fullname" . }}-mysql-secret
              key: mysql-password
        resources:
          {{- toYaml .Values.mysql.resources | nindent 10 }}
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        {{- if .Values.mysql.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "todo-app.fullname" . }}-mysql-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}