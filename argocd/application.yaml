apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app
  namespace: argocd    
spec:
  project: default
  source:
    repoURL: https://github.com/pengchao2022/python_flask_app_cd
    targetRevision: main
    path: helm/todo-app
    helm:
      valueFiles:
        - helm.gotmpl
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app # application namaspace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true