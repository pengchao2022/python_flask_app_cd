name: Generate Static Manifests

on:
  pull_request:
    types:
      - closed
    paths:
      - 'helm/todo-app/**'

permissions:
  contents: write
  pull-requests: write # 🚀 赋予流水线创建和管理 PR 的权限

jobs:
  build-and-deploy:
    # 🚀 只有在你的开发 PR 或者 Renovate PR 被成功合并进 main 时才启动
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Setup Helmfile
        uses: helmfile/helmfile-action@v1.9.0

      - name: Generate Manifests via Helmfile
        run: |
          mkdir -p manifests
          helmfile template --file helm/todo-app/helmfile.yaml > manifests/todo-app-spec.yaml

      # 🚀 核心魔法：因为 main 分支保护不让直接 push，我们自动提交一个新 PR
      - name: Create Pull Request for Manifests Update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 默认自动生成的 Token，完全合法
          branch: auto-update-static-manifests
          title: "chore: auto-generate static manifests from helmfile"
          body: "This PR was automatically generated by GitHub Actions after Helmfile changes were merged."
          commit-message: "chore: update static manifests [skip ci]"