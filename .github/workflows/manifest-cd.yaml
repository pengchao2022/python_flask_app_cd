name: Generate Static Manifests

on:
  pull_request:
    types:
      - closed
    paths:
      - 'helm/todo-app/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    if: |
      github.event.pull_request.merged == true && 
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.title, 'chore(deps):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      # 🚀 核心修复：纯手动解压安装，直接绕过 helm 命令的参数兼容问题
      - name: Hardcode Install Helmfile & Helm Diff
        run: |
          echo "1. Manually downloading and linking helm-diff plugin..."
          # 获取 helm 默认的插件存放路径
          HELM_PLUGIN_DIR=$(helm env HELM_PLUGINS)
          mkdir -p "$HELM_PLUGIN_DIR/helm-diff"
          
          # 直接下载并解压最新的 helm-diff 到目标目录
          DIFF_VERSION=$(curl -s "https://api.github.com/repos/databus23/helm-diff/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -Lo helm-diff.tgz "https://github.com/databus23/helm-diff/releases/download/v${DIFF_VERSION}/helm-diff-linux-amd64.tgz"
          tar -zxf helm-diff.tgz -C "$HELM_PLUGIN_DIR/helm-diff"
          
          # 验证插件是否生效
          helm plugin list

          echo "2. Installing Helmfile CLI..."
          # 直接下载官方最新的静态二进制文件
          HELMFILE_VERSION=$(curl -s "https://api.github.com/repos/helmfile/helmfile/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -Lo helmfile.tar.gz "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz"
          tar -zxf helmfile.tar.gz helmfile
          sudo mv helmfile /usr/local/bin/
          helmfile --version

      - name: Generate Manifests via Helmfile
        run: |
          mkdir -p manifests
          helmfile template --file helm/todo-app/helmfile.yaml > manifests/todo-app-spec.yaml

      - name: Create Pull Request for Manifests Update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-update-static-manifests
          title: "chore: auto-generate static manifests from helmfile"
          body: "This PR was automatically generated by GitHub Actions after Helmfile changes were merged."
          commit-message: "chore: update static manifests [skip ci]"