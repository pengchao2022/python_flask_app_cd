name: Run Renovate

on:
  repository_dispatch:
    types: [run-renovate] 
  schedule:
    - cron: '0 */6 * * *'  
  workflow_dispatch:        

jobs:
  renovate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      statuses: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Renovate
        uses: renovatebot/github-action@v40.3.6
        with:
          token: ${{ secrets.GITOPS_PAT }} 
          configurationFile: renovate.json
        env:
          RENOVATE_AUTODISCOVER: 'true'
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.repository }}
          LOG_LEVEL: "debug"