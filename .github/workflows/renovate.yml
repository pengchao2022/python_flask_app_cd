name: Run Renovate

on:
  repository_dispatch:
    types: [run-renovate]  # 由 Application Repo 触发
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时也运行一次（作为备份）
  workflow_dispatch:        # 也可以手动触发

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Renovate
        uses: renovatebot/github-action@v40.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json